<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1b3a1e" />
<title>Critter Wilds — Survival RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap');
:root{
  --ink:#20301c; --outline:#1c2716; --panel:#fff6e6; --panelEdge:#c98b3a;
  --accent:#54c23a; --accentDark:#2f8f22; --blue:#2f8fe0; --gold:#ffd23c;
  --danger:#e8483a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;font-family:'Fredoka',system-ui,'Segoe UI',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#0c140d;color:#fff;
  touch-action:none;overscroll-behavior:none;}
#game{position:fixed;inset:0;display:block;background:#3a7d33;}

/* ---------- HUD ---------- */
#hud{position:fixed;top:calc(8px + env(safe-area-inset-top)); left:calc(10px + env(safe-area-inset-left));
  display:flex;gap:8px;align-items:center;pointer-events:none;z-index:5;}
.stat{display:flex;align-items:center;gap:6px;background:rgba(12,22,14,.55);
  border:2px solid rgba(0,0,0,.35);border-radius:20px;padding:4px 9px 4px 5px;backdrop-filter:blur(3px);}
.stat .ic{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:13px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.25);}
.bar{width:74px;height:9px;border-radius:6px;background:rgba(0,0,0,.4);overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:6px;transition:width .25s ease;}
#coinPill{position:fixed;top:calc(8px + env(safe-area-inset-top));right:calc(12px + env(safe-area-inset-right));
  background:rgba(12,22,14,.6);border:2px solid rgba(0,0,0,.35);border-radius:20px;
  padding:5px 12px 5px 9px;font-weight:700;color:var(--gold);font-size:15px;z-index:5;
  display:flex;align-items:center;gap:5px;backdrop-filter:blur(3px);}

/* ---------- Joystick ---------- */
#joyBase,#joyKnob{position:fixed;border-radius:50%;pointer-events:none;z-index:6;display:none;
  transform:translate(-50%,-50%);}
#joyBase{width:132px;height:132px;background:radial-gradient(circle,rgba(255,255,255,.14),rgba(255,255,255,.05));
  border:3px solid rgba(255,255,255,.35);box-shadow:0 4px 18px rgba(0,0,0,.35);}
#joyKnob{width:62px;height:62px;background:radial-gradient(circle at 35% 30%,#fdfdfd,#c7d3c0);
  border:3px solid rgba(0,0,0,.25);box-shadow:0 5px 12px rgba(0,0,0,.4);}

/* ---------- Action buttons ---------- */
.ui-btn{position:fixed;z-index:7;border:none;border-radius:50%;color:#fff;font-weight:700;
  display:grid;place-items:center;box-shadow:0 6px 0 rgba(0,0,0,.28), inset 0 3px 0 rgba(255,255,255,.35);
  transition:transform .06s, box-shadow .06s;touch-action:none;}
.ui-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.28), inset 0 3px 0 rgba(255,255,255,.3);}
#btnA{right:calc(26px + env(safe-area-inset-right));bottom:calc(30px + env(safe-area-inset-bottom));
  width:92px;height:92px;font-size:22px;background:linear-gradient(#63d24a,#37981f);}
#btnMenu{right:calc(132px + env(safe-area-inset-right));bottom:calc(40px + env(safe-area-inset-bottom));
  width:60px;height:60px;font-size:24px;background:linear-gradient(#f4b53c,#d98a1e);}
#interactTag{position:fixed;z-index:7;right:calc(24px + env(safe-area-inset-right));
  bottom:calc(128px + env(safe-area-inset-bottom));background:#fff;color:var(--ink);
  font-weight:700;font-size:14px;padding:6px 14px;border-radius:16px;border:3px solid var(--outline);
  box-shadow:0 4px 0 rgba(0,0,0,.25);display:none;white-space:nowrap;}

/* ---------- Toast + dialog ---------- */
#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:9;
  background:rgba(12,22,14,.9);border:2px solid rgba(255,255,255,.15);border-radius:22px;
  padding:8px 18px;font-weight:600;font-size:14px;opacity:0;transition:opacity .3s, top .3s;pointer-events:none;}
#dialog{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + env(safe-area-inset-bottom));
  width:min(680px,92vw);z-index:8;background:var(--panel);color:var(--ink);
  border:4px solid var(--outline);border-radius:18px;padding:16px 18px 14px;font-size:17px;
  line-height:1.35;font-weight:500;display:none;box-shadow:0 8px 0 rgba(0,0,0,.28);}
#dialog small{display:block;margin-top:8px;color:#9a7a3a;font-weight:600;font-size:12px;}

/* ---------- Generic panels/overlays ---------- */
.overlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;text-align:center;padding:26px;
  background:radial-gradient(circle at 50% 30%,#245a2a,#0b160d 78%);}
.overlay h1{font-size:min(13vw,54px);color:#eafbe0;font-weight:700;letter-spacing:1px;
  text-shadow:0 4px 0 #163f16, 0 0 26px rgba(84,194,58,.6);}
.overlay p{max-width:420px;color:#cfe6c2;font-size:16px;font-weight:500;line-height:1.4;}
.bigbtn{background:linear-gradient(#63d24a,#37981f);color:#fff;border:4px solid var(--outline);
  border-radius:18px;padding:15px 34px;font-size:20px;font-weight:700;cursor:pointer;
  box-shadow:0 7px 0 rgba(0,0,0,.3), inset 0 3px 0 rgba(255,255,255,.35);}
.bigbtn:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(0,0,0,.3), inset 0 3px 0 rgba(255,255,255,.3);}
.bigbtn.alt{background:linear-gradient(#8a9aa6,#5f6d78);}
.starter{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.scard{background:var(--panel);border:4px solid var(--outline);border-radius:18px;padding:12px;
  width:130px;cursor:pointer;color:var(--ink);box-shadow:0 6px 0 rgba(0,0,0,.3);}
.scard:active{transform:translateY(4px);}
.scard b{font-size:16px;font-weight:700;}
.scard small{display:block;font-weight:600;margin-top:2px;}

/* ---------- Battle ---------- */
#battle{position:fixed;inset:0;z-index:15;display:none;flex-direction:column;
  background:linear-gradient(165deg,#bfe8f7,#e4f2d4 55%,#c4e79a);color:var(--ink);}
#bfield{position:relative;flex:1;overflow:hidden;}
.mon{position:absolute;text-align:center;}
.foe{bottom:6%;right:11%;} .ally{bottom:6%;left:11%;}
.plate{position:absolute;background:var(--panel);border:4px solid var(--outline);border-radius:16px;
  padding:8px 12px;min-width:170px;box-shadow:0 5px 0 rgba(0,0,0,.22);font-weight:600;}
.foeplate{top:6%;right:5%;} .allyplate{top:6%;left:5%;}
.plate .row{display:flex;align-items:center;gap:7px;font-size:15px;}
.plate .hpwrap{height:10px;background:#6a5a44;border-radius:6px;margin-top:5px;overflow:hidden;}
.plate .hpwrap>i{display:block;height:100%;background:#54c23a;transition:width .3s;}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;color:#fff;
  text-transform:uppercase;letter-spacing:.4px;}
#bmenu{background:var(--panel);border-top:5px solid var(--outline);padding:12px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:150px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom));}
#bmsg{grid-column:1/3;font-size:17px;color:var(--ink);font-weight:600;min-height:24px;}
.cbtn{background:linear-gradient(#fff,#ffedd0);border:4px solid var(--outline);border-radius:16px;
  padding:16px;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;text-align:center;
  box-shadow:0 5px 0 rgba(0,0,0,.2);transition:transform .06s,box-shadow .06s;}
.cbtn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.2);}
.cbtn.small{padding:12px;font-size:15px;}
.cbtn.wide{grid-column:1/3;}
.cbtn:disabled{opacity:.45;}
.cbtn small{font-weight:500;font-size:12px;color:#8a6d3a;}

/* ---------- Team & Bag / Shop panel ---------- */
#panel{position:fixed;inset:0;z-index:16;display:none;flex-direction:column;gap:10px;
  background:rgba(9,16,10,.94);padding:18px;padding-top:calc(18px + env(safe-area-inset-top));overflow:auto;}
#panel h2{color:#eafbe0;font-size:22px;font-weight:700;text-align:center;}
.subline{text-align:center;color:#cfe6c2;font-size:14px;font-weight:600;}
.plist{display:flex;flex-direction:column;gap:9px;max-width:640px;width:100%;margin:0 auto;}
.pcard{background:var(--panel);color:var(--ink);border:4px solid var(--outline);border-radius:16px;
  padding:10px 13px;display:flex;align-items:center;gap:11px;box-shadow:0 4px 0 rgba(0,0,0,.22);}
.pcard .mini{width:46px;height:46px;flex:none;}
.pcard .lv{margin-left:auto;font-weight:700;font-size:13px;opacity:.75;}
.pcard .hpwrap{height:8px;background:#6a5a44;border-radius:6px;margin-top:4px;overflow:hidden;}
.pcard .hpwrap>i{display:block;height:100%;background:#54c23a;}
.prow{max-width:640px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:8px;}

/* ---------- Rotate prompt ---------- */
#rotate{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;background:#0b160d;color:#eafbe0;text-align:center;padding:30px;}
#rotate .ph{font-size:56px;animation:spin 2s ease-in-out infinite;}
@keyframes spin{0%,40%{transform:rotate(0)}60%,100%{transform:rotate(90deg)}}

.flash{animation:flash .4s;} @keyframes flash{0%,100%{filter:none}50%{filter:brightness(1.7) saturate(1.4)}}
.shake{animation:shake .35s;} @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="stat"><div class="ic" style="background:#f2a33a">🍖</div><div class="bar"><i id="mHunger" style="background:linear-gradient(90deg,#e6952b,#f2c14e)"></i></div></div>
  <div class="stat"><div class="ic" style="background:#2f8fe0">⚡</div><div class="bar"><i id="mEnergy" style="background:linear-gradient(90deg,#2b8ce6,#5fd0f5)"></i></div></div>
  <div class="stat"><div class="ic" id="leadIc" style="background:#54c23a">🐾</div><div class="bar"><i id="mHp" style="background:linear-gradient(90deg,#e8483a,#ff6b5b)"></i></div></div>
</div>
<div id="coinPill">◉ <span id="coinVal">0</span></div>

<!-- Joystick + buttons -->
<div id="joyBase"></div><div id="joyKnob"></div>
<div id="interactTag"></div>
<button class="ui-btn" id="btnMenu">☰</button>
<button class="ui-btn" id="btnA">A</button>

<div id="toast"></div>
<div id="dialog"></div>

<!-- Battle -->
<div id="battle">
  <div id="bfield">
    <div class="mon foe" id="foeMon"></div>
    <div class="mon ally" id="allyMon"></div>
    <div class="plate foeplate" id="foePlate"></div>
    <div class="plate allyplate" id="allyPlate"></div>
  </div>
  <div id="bmenu">
    <div id="bmsg"></div>
    <button class="cbtn" id="bFight">Fight</button>
    <button class="cbtn" id="bCatch">Catch</button>
    <button class="cbtn" id="bBag">Bag</button>
    <button class="cbtn" id="bRun">Run</button>
  </div>
</div>

<!-- Panel -->
<div id="panel"></div>

<!-- Title -->
<div class="overlay" id="title" style="display:flex">
  <h1>Critter Wilds</h1>
  <p>Roam the wild with a tap-to-move joystick, befriend critters, and survive. Build a team of six!</p>
  <button class="bigbtn" id="startBtn">New Game</button>
  <p style="font-size:13px;opacity:.7">Touch-first · progress auto-saves in your browser</p>
</div>

<!-- Starter -->
<div class="overlay" id="starterSel">
  <h1 style="font-size:30px">Pick your first critter</h1>
  <div class="starter" id="starterCards"></div>
</div>

<!-- Rotate -->
<div id="rotate"><div class="ph">📱</div><div style="font-size:20px;font-weight:700">Please rotate your device</div><div style="opacity:.8">Critter Wilds plays best in landscape.</div></div>

<script>
"use strict";
/* ===================================================================
   CRITTER WILDS — touch-first, joystick movement, Brawl-Stars-y art
   =================================================================== */
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

/* ---------- tunables ---------- */
const TILE=56, PR=18, SPEED=220;   // world px per tile, player radius, move speed px/s
const VIEW={w:0,h:0};
let DPR=1;

/* ---------- types ---------- */
const TYPES={
  Leaf:{color:'#4caf50',strong:['Aqua','Stone'],weak:['Ember','Gale']},
  Ember:{color:'#e8613c',strong:['Leaf','Gale'],weak:['Aqua','Stone']},
  Aqua:{color:'#2f8fe0',strong:['Ember','Stone'],weak:['Leaf','Spark']},
  Spark:{color:'#f2c336',strong:['Aqua','Gale'],weak:['Stone','Leaf']},
  Stone:{color:'#b08d57',strong:['Ember','Spark'],weak:['Aqua','Leaf']},
  Gale:{color:'#9b8cf0',strong:['Leaf','Spark'],weak:['Ember','Stone']},
};
function effect(a,d){const t=TYPES[a];if(!t)return 1;if(t.strong.includes(d))return 2;if(t.weak.includes(d))return .5;return 1;}

const MOVES={
  Tackle:{type:'Stone',power:35,acc:.95}, Vinelash:{type:'Leaf',power:40,acc:.95},
  Emberpuff:{type:'Ember',power:40,acc:.95}, Bubble:{type:'Aqua',power:40,acc:.95},
  Zap:{type:'Spark',power:40,acc:.95}, Gust:{type:'Gale',power:38,acc:.95},
  Pebble:{type:'Stone',power:40,acc:.9}, Leafstorm:{type:'Leaf',power:60,acc:.8},
  Scorch:{type:'Ember',power:60,acc:.8}, Torrent:{type:'Aqua',power:60,acc:.8},
  Thunder:{type:'Spark',power:65,acc:.75}, Boulder:{type:'Stone',power:62,acc:.78},
  Cyclone:{type:'Gale',power:58,acc:.82},
  Leafblade:{type:'Leaf',power:46,acc:.92}, Toxvine:{type:'Leaf',power:42,acc:.9,status:'poison',schance:.35},
  Firefang:{type:'Ember',power:45,acc:.9,status:'burn',schance:.35}, Flareburst:{type:'Ember',power:64,acc:.78,status:'burn',schance:.2},
  Aquajet:{type:'Aqua',power:44,acc:.95}, Frostjet:{type:'Aqua',power:45,acc:.9,status:'chill',schance:.35},
  Static:{type:'Spark',power:44,acc:.9,status:'para',schance:.35}, Voltcrash:{type:'Spark',power:66,acc:.75,status:'para',schance:.2},
  Quill:{type:'Gale',power:44,acc:.92}, Rocktoss:{type:'Stone',power:42,acc:.9}, Sandslam:{type:'Stone',power:46,acc:.88},
  Lullwind:{type:'Gale',power:0,acc:.75,status:'sleep',schance:1},
};
const SPECIES={
  Sproutle:{type:'Leaf',hp:45,atk:12,def:11,spd:11,color:'#5bbf4c',accent:'#2e7d32',shape:'round',moves:['Vinelash','Tackle','Leafstorm']},
  Cindnip:{type:'Ember',hp:44,atk:14,def:9,spd:13,color:'#ef6a45',accent:'#b23a1c',shape:'fox',moves:['Emberpuff','Tackle','Scorch']},
  Puddlet:{type:'Aqua',hp:48,atk:11,def:12,spd:10,color:'#3f9be6',accent:'#1c5fa0',shape:'round',moves:['Bubble','Tackle','Torrent']},
  Sparkit:{type:'Spark',hp:42,atk:13,def:9,spd:15,color:'#f4cf4a',accent:'#c79a11',shape:'fox',moves:['Zap','Tackle','Thunder']},
  Pebblo:{type:'Stone',hp:52,atk:12,def:15,spd:7,color:'#b8935e',accent:'#7a5a30',shape:'blob',moves:['Pebble','Tackle','Boulder']},
  Zephlet:{type:'Gale',hp:43,atk:12,def:10,spd:14,color:'#a99cf2',accent:'#6b5cc0',shape:'bird',moves:['Gust','Tackle','Cyclone']},
  Mosslet:{type:'Leaf',hp:50,atk:11,def:13,spd:9,color:'#7cc26a',accent:'#3e7d34',shape:'blob',moves:['Vinelash','Tackle']},
  Emburr:{type:'Ember',hp:47,atk:15,def:10,spd:12,color:'#e2542e',accent:'#9c2f13',shape:'blob',moves:['Emberpuff','Pebble','Scorch']},
  Thornip:{type:'Leaf',hp:46,atk:14,def:11,spd:12,color:'#66bb3a',accent:'#33691e',shape:'fox',moves:['Leafblade','Toxvine','Leafstorm']},
  Fernbud:{type:'Leaf',hp:54,atk:11,def:14,spd:8,color:'#9ccc65',accent:'#558b2f',shape:'round',moves:['Vinelash','Toxvine']},
  Blazehog:{type:'Ember',hp:55,atk:16,def:12,spd:9,color:'#e64a19',accent:'#8d2408',shape:'blob',moves:['Firefang','Pebble','Flareburst']},
  Ashmoth:{type:'Ember',hp:44,atk:13,def:9,spd:15,color:'#ff8a65',accent:'#bf360c',shape:'bird',moves:['Emberpuff','Quill','Firefang']},
  Finewt:{type:'Aqua',hp:47,atk:13,def:11,spd:12,color:'#29b6f6',accent:'#0277bd',shape:'fox',moves:['Aquajet','Frostjet','Torrent']},
  Coralux:{type:'Aqua',hp:52,atk:11,def:14,spd:9,color:'#4dd0e1',accent:'#00838f',shape:'round',moves:['Bubble','Frostjet']},
  Voltail:{type:'Spark',hp:43,atk:14,def:9,spd:16,color:'#ffd54f',accent:'#f9a825',shape:'bird',moves:['Static','Quill','Voltcrash']},
  Ionfox:{type:'Spark',hp:45,atk:15,def:10,spd:14,color:'#fff176',accent:'#fbc02d',shape:'fox',moves:['Zap','Static','Thunder']},
  Craggle:{type:'Stone',hp:56,atk:13,def:16,spd:6,color:'#a1887f',accent:'#5d4037',shape:'blob',moves:['Rocktoss','Sandslam','Boulder']},
  Boulderbeast:{type:'Stone',hp:62,atk:15,def:17,spd:5,color:'#8d6e63',accent:'#4e342e',shape:'blob',moves:['Sandslam','Pebble','Boulder']},
  Breezle:{type:'Gale',hp:44,atk:12,def:10,spd:15,color:'#b39ddb',accent:'#5e35b1',shape:'round',moves:['Gust','Lullwind','Cyclone']},
  Nimbling:{type:'Gale',hp:48,atk:13,def:11,spd:13,color:'#9fa8da',accent:'#3949ab',shape:'blob',moves:['Quill','Lullwind','Cyclone']},
};
const STARTERS=['Sproutle','Cindnip','Puddlet'];
const WILD_POOL=Object.keys(SPECIES);
const SHOP=[
  {key:'orb',name:'Orb',price:20,desc:'Catches wild critters.'},
  {key:'superorb',name:'Super Orb',price:65,desc:'Far better catch rate.'},
  {key:'berry',name:'Berry',price:15,desc:'Heals 40% HP + hunger.'},
  {key:'potion',name:'Potion',price:30,desc:'Restores 60 HP.'},
  {key:'revive',name:'Revive',price:70,desc:'Revives a fainted critter.'},
  {key:'ration',name:'Ration',price:25,desc:'Fully restores hunger.'},
];
const ITEM_KEYS=['orb','superorb','berry','potion','revive','ration'];

function makeCritter(name,level){const s=SPECIES[name];const c={species:name,type:s.type,level,xp:0,moves:s.moves.slice(0,4),status:null,statusT:0,_s:s};recalc(c);c.hp=c.maxHp;return c;}
function recalc(c){const s=c._s||SPECIES[c.species];c._s=s;c.type=s.type;const L=c.level;
  c.maxHp=Math.floor(s.hp*(1+(L-1)*0.16))+5;c.atk=Math.floor(s.atk*(1+(L-1)*0.11))+2;
  c.def=Math.floor(s.def*(1+(L-1)*0.11))+2;c.spd=Math.floor(s.spd*(1+(L-1)*0.10))+2;
  if(c.hp===undefined)c.hp=c.maxHp;if(c.hp>c.maxHp)c.hp=c.maxHp;}
function xpToNext(l){return 16+l*l*4;}

/* ---------- map ---------- */
const MAP_STR=[
"TTTTTTTTTTTTTTTTTTTTTTTTTTTTTT",
"T............TT........,,,,,,.T",
"T..HH...HH...TT...T....,,,,,,.T",
"T..HH...HH...........T.,,,,,,.T",
"T..PP...PP...P........,,,,,,,.T",
"T..PPPPPPPPPPP..T.....,,,,,,,.T",
"T......N.....P.......T.,,,,,.TT",
"T..S...PPPP..P..BB.....,,,,..TT",
"T......P..P..P..BB......,,...FT",
"T..HH..P..PPPP.........~~~~..FT",
"T..HH..P.......T.....~~~~~~~..T",
"T......P....B.......~WWWWW~~..T",
"T..PPPPP...........~WWWWWWW~..T",
"T..P.......TT.....~WWWWWWWWW..T",
"T..P...,,,,.TT....~~WWWWWWW~..T",
"T..P..,,,,,,......T.~~WWW~~...T",
"T.....,,,,,,.......T..~~~....TT",
"T......,,,,....BB......T.....TT",
"T............................T",
"TTTTTTTTTTTTTTTTTTTTTTTTTTTTTT",
];
const MAP_W=MAP_STR[0].length, MAP_H=MAP_STR.length;
const WORLD_W=MAP_W*TILE, WORLD_H=MAP_H*TILE;
let grid=[];
const SOLID=new Set(['T','W','H','F','M','N','S','B']);
const PROP=new Set(['T','H','F','M','N','S','B']); // depth-sorted tall things
function buildGrid(){grid=[];for(let y=0;y<MAP_H;y++){const r=[];for(let x=0;x<MAP_W;x++)r.push(MAP_STR[y][x]);grid.push(r);}placeMerchant();}
function placeMerchant(){let nx=-1,ny=-1;for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++)if(grid[y][x]==='N'){nx=x;ny=y;}
  if(nx<0)return;for(const[x,y]of[[nx+2,ny],[nx-2,ny],[nx,ny-2],[nx,ny+2]]){if(x>0&&y>0&&x<MAP_W-1&&y<MAP_H-1&&grid[y][x]==='.'){grid[y][x]='M';return;}}}
function tileAt(x,y){if(x<0||y<0||x>=MAP_W||y>=MAP_H)return 'T';return grid[y][x];}
function tileAtWorld(wx,wy){return tileAt(Math.floor(wx/TILE),Math.floor(wy/TILE));}

/* ---------- state ---------- */
let G=null;
const P={x:0,y:0,vx:0,vy:0,face:Math.PI/2,walk:0,moving:false};
const cam={x:0,y:0};
let mode='title';
function newGame(starter){
  G={px:5.5*TILE,py:6.5*TILE,face:Math.PI/2,
    hunger:100,energy:100,party:[makeCritter(starter,5)],
    items:{orb:5,superorb:0,berry:3,potion:0,revive:0,ration:1},coins:60,
    caughtSpecies:{[starter]:true},day:1};
  syncPlayer();save();
}
function syncPlayer(){P.x=G.px;P.y=G.py;P.vx=P.vy=0;P.face=G.face||Math.PI/2;cam.x=clampCamX(P.x-VIEW.w/2);cam.y=clampCamY(P.y-VIEW.h/2);}

/* ---------- persistence ---------- */
const SAVE_KEY='critter-wilds-save-v3';
function save(){try{if(G){G.px=P.x;G.py=P.y;G.face=P.face;}localStorage.setItem(SAVE_KEY,JSON.stringify(G,(k,v)=>k==='_s'?undefined:v));}catch(e){}}
function load(){try{const r=localStorage.getItem(SAVE_KEY);if(!r)return false;G=JSON.parse(r);migrate();G.party.forEach(recalc);syncPlayer();return true;}catch(e){return false;}}
function migrate(){if(!G.items)G.items={orb:5,superorb:0,berry:3,potion:0,revive:0,ration:0};
  ITEM_KEYS.forEach(k=>{if(G.items[k]===undefined)G.items[k]=0;});if(G.coins===undefined)G.coins=60;
  (G.party||[]).forEach(c=>{if(c.status===undefined){c.status=null;c.statusT=0;}});
  if(G.px===undefined||G.px<MAP_W){G.px=5.5*TILE;G.py=6.5*TILE;}}

/* ===================================================================
   PARTICLES
   =================================================================== */
const parts=[];
function spawn(x,y,opts){parts.push(Object.assign({x,y,vx:0,vy:0,life:0,max:.5,r:4,c:'#fff',g:0,type:'dot'},opts));}
function updateParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.life+=dt;if(p.life>=p.max){parts.splice(i,1);continue;}
  p.vy+=p.g*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;}}
function drawParts(){for(const p of parts){const k=1-p.life/p.max;ctx.globalAlpha=Math.max(0,k);
  const sx=p.x-cam.x, sy=p.y-cam.y;ctx.fillStyle=p.c;
  if(p.type==='blade'){ctx.fillRect(sx,sy,3,7);}
  else{ctx.beginPath();ctx.arc(sx,sy,p.r*(0.5+k*0.6),0,7);ctx.fill();}}
  ctx.globalAlpha=1;}

/* ===================================================================
   DRAWING
   =================================================================== */
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function shadow(sx,sy,rw,rh){ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(sx,sy,rw,rh,0,0,7);ctx.fill();}

/* ---- ground tiles (flat) ---- */
function drawGround(t,sx,sy){
  switch(t){
    case 'P': ctx.fillStyle='#e0b877';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(150,110,60,.22)';ctx.fillRect(sx+8,sy+12,6,5);ctx.fillRect(sx+30,sy+30,7,5);ctx.fillRect(sx+20,sy+8,5,4);break;
    case '~': ctx.fillStyle='#f0dfa0';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(200,180,120,.4)';ctx.fillRect(sx+10,sy+16,4,4);ctx.fillRect(sx+34,sy+34,4,4);break;
    case 'W': {ctx.fillStyle='#2fa6e6';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(150,224,255,.5)';const wy=sy+18+Math.sin((animT*2+sx)*0.05)*3;
      ctx.fillRect(sx+6,wy,20,3);ctx.fillRect(sx+28,wy+12,16,3);break;}
    case ',': {ctx.fillStyle='#3f9b39';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#347f2f';for(let i=0;i<5;i++)ctx.fillRect(sx+5+i*10,sy+TILE*0.5,4,TILE*0.5);
      ctx.fillStyle='#54c23a';const sw=Math.sin((animT*2+sx)*0.06)*3;
      for(let i=0;i<5;i++)ctx.fillRect(sx+6+i*10+sw,sy+TILE*0.42,3,TILE*0.45);break;}
    default: { // grass — two-tone checker + blades
      const cx2=Math.floor(sx/TILE),cy2=Math.floor(sy/TILE);
      ctx.fillStyle=((cx2+cy2)&1)?'#57b84a':'#51ad45';ctx.fillRect(sx,sy,TILE,TILE);
      const h=(Math.abs((cx2*13+cy2*7))%23);if(h<9){ctx.fillStyle='rgba(46,120,44,.55)';
        ctx.fillRect(sx+14,sy+18,3,7);ctx.fillRect(sx+18,sy+16,3,9);ctx.fillRect(sx+22,sy+19,3,6);}
    }
  }
}
/* ---- props (tall, with outline + shadow) ---- */
function outlineShape(fn,fill,lw){ctx.lineJoin='round';ctx.strokeStyle='#1c2716';ctx.lineWidth=lw||4;fn();ctx.fillStyle=fill;ctx.fill();ctx.stroke();}
function drawProp(t,sx,sy){
  const cx=sx+TILE/2, base=sy+TILE-6;
  if(t==='T'){shadow(cx,base,TILE*0.4,TILE*0.16);
    ctx.fillStyle='#8a5a2b';ctx.strokeStyle='#1c2716';ctx.lineWidth=4;rr(cx-6,base-30,12,32,4);ctx.fill();ctx.stroke();
    const sway=Math.sin((animT+sx)*0.03)*3;
    outlineShape(()=>{ctx.beginPath();ctx.arc(cx+sway,base-46,26,0,7);ctx.closePath();},'#3fa63a',5);
    ctx.fillStyle='#63d24a';ctx.beginPath();ctx.arc(cx-8+sway,base-54,13,0,7);ctx.fill();}
  else if(t==='H'){shadow(cx,base+2,TILE*0.5,TILE*0.16);
    outlineShape(()=>rr(sx+4,sy+22,TILE-8,TILE-24,6),'#e8c48a',4);
    outlineShape(()=>{ctx.beginPath();ctx.moveTo(sx+1,sy+26);ctx.lineTo(cx,sy+2);ctx.lineTo(sx+TILE-1,sy+26);ctx.closePath();},'#c0563a',4);
    ctx.fillStyle='#6b4326';ctx.strokeStyle='#1c2716';ctx.lineWidth=3;rr(cx-8,base-20,16,20,3);ctx.fill();ctx.stroke();}
  else if(t==='M'){shadow(cx,base+2,TILE*0.5,TILE*0.16);
    outlineShape(()=>rr(sx+4,sy+22,TILE-8,TILE-24,6),'#eef2f5',4);
    outlineShape(()=>rr(sx+2,sy+14,TILE-4,12,4),'#2f8fe0',4);
    ctx.fillStyle='#ffd23c';ctx.strokeStyle='#1c2716';ctx.lineWidth=3;rr(cx-7,base-18,14,18,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 13px Fredoka';ctx.textAlign='center';ctx.fillText('🛒',cx,sy+24);}
  else if(t==='N'){shadow(cx,base+2,TILE*0.42,TILE*0.15);
    outlineShape(()=>rr(sx+7,sy+20,TILE-14,TILE-22,6),'#ffffff',4);
    outlineShape(()=>rr(sx+4,sy+12,TILE-8,12,4),'#ff6f9d',4);
    ctx.fillStyle='#fff';ctx.strokeStyle='#e0426f';ctx.lineWidth=3;
    rr(cx-3,sy+30,6,18,2);ctx.fill();rr(cx-9,sy+36,18,6,2);ctx.fill();}
  else if(t==='S'){shadow(cx,base,TILE*0.3,TILE*0.12);
    ctx.fillStyle='#7a5230';ctx.strokeStyle='#1c2716';ctx.lineWidth=3;rr(cx-3,base-20,6,20,2);ctx.fill();ctx.stroke();
    outlineShape(()=>rr(sx+8,sy+16,TILE-16,20,4),'#caa15a',4);
    ctx.fillStyle='#5a3a1e';ctx.fillRect(sx+14,sy+22,TILE-28,3);ctx.fillRect(sx+14,sy+28,TILE-30,3);}
  else if(t==='B'){shadow(cx,base,TILE*0.36,TILE*0.14);const sw=Math.sin((animT+sx)*0.05)*2;
    outlineShape(()=>{ctx.beginPath();ctx.arc(cx+sw,base-14,20,0,7);ctx.closePath();},'#2f8f3a',4);
    ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(cx-7+sw,base-20,9,0,7);ctx.fill();
    ctx.fillStyle='#e5372f';for(const[dx,dy]of[[-6,-10],[6,-4],[0,4],[10,-12]]){ctx.beginPath();ctx.arc(cx+dx+sw,base-14+dy,3.5,0,7);ctx.fill();}}
  else if(t==='F'){ctx.fillStyle='#8a5a2b';ctx.strokeStyle='#1c2716';ctx.lineWidth=3;
    rr(sx+10,base-24,7,26,2);ctx.fill();ctx.stroke();rr(sx+34,base-24,7,26,2);ctx.fill();ctx.stroke();
    rr(sx+6,base-20,TILE-12,7,2);ctx.fill();ctx.stroke();}
}

/* ---- cel-shaded critter (used in world? no; battle/panel) ---- */
function drawCritter(cv,size,species){
  const s=SPECIES[species],c=cv.getContext('2d');c.clearRect(0,0,size,size);
  const cx=size/2,cy=size*0.55,r=size*0.30;
  c.fillStyle='rgba(0,0,0,.18)';c.beginPath();c.ellipse(cx,size*0.9,r*1.05,r*0.32,0,0,7);c.fill();
  c.lineJoin='round';c.strokeStyle='#1c2716';c.lineWidth=Math.max(2,size*0.045);
  if(s.shape==='fox'){c.fillStyle=s.accent;
    for(const dx of[-1,1]){c.beginPath();c.moveTo(cx+dx*r*0.9,cy-r*0.5);c.lineTo(cx+dx*r*1.15,cy-r*1.5);c.lineTo(cx+dx*r*0.25,cy-r*0.95);c.closePath();c.fill();c.stroke();}}
  if(s.shape==='bird'){c.fillStyle=s.accent;for(const dx of[-1,1]){c.beginPath();c.ellipse(cx+dx*r*1.1,cy,r*0.7,r*0.4,dx*0.5,0,7);c.fill();c.stroke();}}
  c.fillStyle=s.color;c.beginPath();c.ellipse(cx,cy,r,r*1.05,0,0,7);c.fill();c.stroke();
  c.fillStyle='rgba(255,255,255,.35)';c.beginPath();c.ellipse(cx,cy+r*0.25,r*0.55,r*0.6,0,0,7);c.fill();
  c.fillStyle='rgba(0,0,0,.10)';c.beginPath();c.ellipse(cx,cy-r*0.4,r*0.7,r*0.35,0,0,7);c.fill();
  if(s.shape==='round'||s.shape==='blob'){c.fillStyle=s.accent;
    for(const dx of[-1,1]){c.beginPath();c.arc(cx+dx*r*0.55,cy-r*0.85,r*0.22,0,7);c.fill();c.stroke();}}
  const eo=r*0.36;c.fillStyle='#1a1a1a';
  for(const dx of[-1,1]){c.beginPath();c.arc(cx+dx*eo,cy-r*0.08,r*0.15,0,7);c.fill();}
  c.fillStyle='#fff';for(const dx of[-1,1]){c.beginPath();c.arc(cx+dx*eo+size*0.02,cy-r*0.14,r*0.05,0,7);c.fill();}
  c.fillStyle='rgba(255,120,120,.4)';for(const dx of[-1,1]){c.beginPath();c.arc(cx+dx*r*0.6,cy+r*0.16,r*0.12,0,7);c.fill();}
}
const spriteCache={};
function spriteCanvas(sp,size){const k=sp+size;if(spriteCache[k])return spriteCache[k];const cv=document.createElement('canvas');cv.width=size;cv.height=size;drawCritter(cv,size,sp);spriteCache[k]=cv;return cv;}

/* ---- hero (world) ---- */
function drawHero(){
  const sx=P.x-cam.x, sy=P.y-cam.y;
  const bob=P.moving?Math.abs(Math.sin(P.walk*8))*4:0;
  const lean=Math.cos(P.face);
  shadow(sx,sy+PR*0.9,PR*1.05,PR*0.4);
  ctx.save();ctx.translate(sx,sy-bob);
  ctx.lineJoin='round';ctx.strokeStyle='#1c2716';ctx.lineWidth=4;
  // body
  ctx.fillStyle='#e6402e';rr(-PR*0.7,-2,PR*1.4,PR*1.25,8);ctx.fill();ctx.stroke();
  // head
  ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(0,-PR*0.7,PR*0.72,0,7);ctx.fill();ctx.stroke();
  // cap
  ctx.fillStyle='#2f6fe0';ctx.beginPath();ctx.arc(0,-PR*0.85,PR*0.74,Math.PI,0);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#2f6fe0';rr(PR*0.1,-PR*0.95,PR*0.8,PR*0.28,4);ctx.fill();ctx.stroke();
  // eyes by facing
  ctx.fillStyle='#20301c';const ex=lean*PR*0.18;
  if(Math.sin(P.face)>-0.4){ctx.beginPath();ctx.arc(ex-PR*0.22,-PR*0.62,2.6,0,7);ctx.fill();ctx.beginPath();ctx.arc(ex+PR*0.22,-PR*0.62,2.6,0,7);ctx.fill();}
  ctx.restore();
}

/* ===================================================================
   RENDER
   =================================================================== */
let animT=0;
function clampCamX(x){return Math.max(0,Math.min(x,WORLD_W-VIEW.w));}
function clampCamY(y){return Math.max(0,Math.min(y,WORLD_H-VIEW.h));}
function renderWorld(){
  animT++;
  // camera smooth follow
  cam.x+=(clampCamX(P.x-VIEW.w/2)-cam.x)*0.12;
  cam.y+=(clampCamY(P.y-VIEW.h/2)-cam.y)*0.12;
  ctx.clearRect(0,0,VIEW.w,VIEW.h);
  const x0=Math.floor(cam.x/TILE),y0=Math.floor(cam.y/TILE);
  const x1=Math.ceil((cam.x+VIEW.w)/TILE),y1=Math.ceil((cam.y+VIEW.h)/TILE);
  // ground
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){const t=tileAt(x,y);
    drawGround(PROP.has(t)?'.':t, x*TILE-cam.x, y*TILE-cam.y);}
  // props + hero, depth sorted by baseY
  const drawList=[];
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){const t=tileAt(x,y);if(PROP.has(t))drawList.push({t,x,y,by:y*TILE+TILE});}
  drawList.push({hero:true,by:P.y+PR});
  drawList.sort((a,b)=>a.by-b.by);
  for(const d of drawList){if(d.hero)drawHero();else drawProp(d.t,d.x*TILE-cam.x,d.y*TILE-cam.y);}
  drawParts();
  // subtle vignette
  const g=ctx.createRadialGradient(VIEW.w/2,VIEW.h*0.42,VIEW.h*0.2,VIEW.w/2,VIEW.h/2,VIEW.h*0.8);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.18)');
  ctx.fillStyle=g;ctx.fillRect(0,0,VIEW.w,VIEW.h);
}

/* ===================================================================
   UPDATE / MOVEMENT
   =================================================================== */
let dustT=0, encAccum=0, encNext=150, surv=0;
function update(dt){
  let ix=0,iy=0;
  if(!dialogCb){
    if(joy.active){ix=joy.nx;iy=joy.ny;}else{ix=kb.x;iy=kb.y;}
  }
  const mag=Math.min(1,Math.hypot(ix,iy));
  let tvx=0,tvy=0;
  if(mag>0.06){const inv=1/Math.hypot(ix,iy);tvx=ix*inv*SPEED*mag;tvy=iy*inv*SPEED*mag;P.face=Math.atan2(iy,ix);}
  P.vx+=(tvx-P.vx)*Math.min(1,dt*12);P.vy+=(tvy-P.vy)*Math.min(1,dt*12);
  moveAxis('x',P.vx*dt);moveAxis('y',P.vy*dt);
  const spd=Math.hypot(P.vx,P.vy);P.moving=spd>18;
  if(P.moving){P.walk+=dt;
    dustT+=dt;if(dustT>0.09){dustT=0;spawn(P.x-Math.cos(P.face)*10,P.y+PR*0.7,{vx:(Math.random()-.5)*20,vy:-8,g:60,max:.4,r:3,c:'rgba(210,200,170,.8)'});}}
  // encounter in tall grass
  const ct=tileAtWorld(P.x,P.y);
  if(ct===','){ if(P.moving){encAccum+=spd*dt;
      if(Math.random()<dt*6)spawn(P.x+(Math.random()-.5)*24,P.y+(Math.random()-.3)*20,{vx:(Math.random()-.5)*30,vy:-30,g:50,max:.5,c:'#63d24a',type:'blade'});
      if(encAccum>encNext){encAccum=0;encNext=140+Math.random()*170;if(firstAlive())startBattle();}}}
  // survival
  surv+=dt;if(surv>0.5){surv=0;
    G.hunger=Math.max(0,G.hunger-(P.moving?0.5:0.25));
    G.energy=Math.max(0,G.energy-(P.moving?0.4:0.15));
    if(G.hunger<=0||G.energy<=0){const l=firstAlive();if(l){l.hp=Math.max(0,l.hp-1);}}
  }
  updateInteract();updateParts(dt);updateHud();
  if((animT&63)===0)save();
}
function moveAxis(ax,d){if(!d)return;const nx=ax==='x'?P.x+d:P.x,ny=ax==='y'?P.y+d:P.y;if(!collides(nx,ny)){P.x=nx;P.y=ny;}else{if(ax==='x')P.vx=0;else P.vy=0;}}
function collides(x,y){for(const[dx,dy]of[[PR,0],[-PR,0],[0,PR],[0,-PR],[PR*0.7,PR*0.7],[-PR*0.7,PR*0.7],[PR*0.7,-PR*0.7],[-PR*0.7,-PR*0.7]]){
  if(SOLID.has(tileAtWorld(x+dx,y+dy)))return true;}return false;}

/* ---- interaction ---- */
let interactTarget=null;
const IL={N:'Heal',M:'Shop',S:'Read',B:'Pick',H:'Rest'};
function updateInteract(){
  interactTarget=null;let best=null,bd=1e9;
  const cx=Math.floor(P.x/TILE),cy=Math.floor(P.y/TILE);
  for(let y=cy-2;y<=cy+2;y++)for(let x=cx-2;x<=cx+2;x++){const t=tileAt(x,y);if(!IL[t])continue;
    const wx=(x+0.5)*TILE,wy=(y+0.5)*TILE,d=Math.hypot(wx-P.x,wy-P.y);
    if(d<bd&&d<TILE*1.15){bd=d;best={t,x,y};}}
  interactTarget=best;
  const tag=document.getElementById('interactTag');
  if(best&&mode==='world'){tag.style.display='block';tag.textContent=IL[best.t];}else tag.style.display='none';
}
function doInteract(){
  if(dialogCb){closeDialog();return;}
  if(mode!=='world'||!interactTarget)return;
  const{t,x,y}=interactTarget;
  if(t==='N')healParty();else if(t==='M')openShop();else if(t==='B')pickBerry(x,y);
  else if(t==='H')restAtHome();
  else if(t==='S')dialog("<b>Sign:</b> Wild critters hide in the tall grass. Rest at a house for energy, heal at the nurse, and buy gear at the Mart 🛒.");
}
function healParty(){G.party.forEach(c=>{c.hp=c.maxHp;c.status=null;c.statusT=0;});G.energy=100;
  dialog("<b>Nurse:</b> Your critters are fully healed and cured!");toast('Team healed');burst(P.x,P.y-10,'#ff9dc0');save();}
function restAtHome(){G.energy=100;G.day++;const l=firstAlive();if(l)l.hp=Math.min(l.maxHp,l.hp+Math.floor(l.maxHp*0.3));
  dialog("<b>Home sweet home.</b> You sleep soundly — energy restored (Day "+G.day+").");toast('Rested');save();}
function pickBerry(x,y){G.items.berry++;grid[y][x]='.';G.hunger=Math.min(100,G.hunger+4);
  toast('+1 Berry');burst((x+.5)*TILE,(y+.5)*TILE,'#e5372f');save();}
function burst(x,y,c){for(let i=0;i<10;i++)spawn(x,y,{vx:Math.cos(i)*70,vy:Math.sin(i)*70-20,g:80,max:.6,r:4,c});}

/* ---------- HUD ---------- */
function clamp(v){return Math.max(0,Math.min(100,v));}
function firstAlive(){return G.party.find(c=>c.hp>0);}
function updateHud(){
  document.getElementById('mHunger').style.width=clamp(G.hunger)+'%';
  document.getElementById('mEnergy').style.width=clamp(G.energy)+'%';
  const l=firstAlive()||G.party[0];
  document.getElementById('mHp').style.width=clamp(l.hp/l.maxHp*100)+'%';
  document.getElementById('coinVal').textContent=G.coins||0;
}

/* ---------- toast + dialog ---------- */
let toastTimer;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.opacity='1';el.style.top='64px';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.opacity='0';el.style.top='56px';},1600);}
let dialogCb=null;
function dialog(m,cb){const el=document.getElementById('dialog');el.style.display='block';
  el.innerHTML=m+'<small>▸ tap A to continue</small>';dialogCb=cb||closeDialog;}
function closeDialog(){document.getElementById('dialog').style.display='none';const cb=dialogCb;dialogCb=null;if(cb&&cb!==closeDialog)cb();}

/* ===================================================================
   BATTLE
   =================================================================== */
let B=null;
function startBattle(){
  const lvl=Math.max(2,G.party[0].level+(Math.floor(Math.random()*3)-1));
  const foe=makeCritter(WILD_POOL[Math.floor(Math.random()*WILD_POOL.length)],lvl);
  B={foe,ally:firstAlive(),busy:false,caught:false,ran:false};mode='battle';
  document.getElementById('battle').style.display='flex';restoreBattleMenu();
  setBMsg(`A wild <b>${foe.species}</b> (Lv.${foe.level}) appeared!`);
}
function typeChip(t){return `<span class="chip" style="background:${TYPES[t].color}">${t}</span>`;}
const STATUS_COL={burn:'#e8613c',poison:'#8e44ad',para:'#f1c40f',sleep:'#607d8b',chill:'#4aa8d8'};
function statusChip(c){return c.status?`<span class="chip" style="background:${STATUS_COL[c.status]}">${c.status}</span>`:'';}
function plate(c){const pct=Math.max(0,c.hp/c.maxHp*100),col=pct>50?'#54c23a':pct>20?'#f2c14e':'#e8483a';
  return `<div class="row"><b>${c.species}</b> ${typeChip(c.type)}${statusChip(c)} <span style="margin-left:auto">Lv.${c.level}</span></div>
    <div class="hpwrap"><i style="width:${pct}%;background:${col}"></i></div>
    <div style="font-size:12px;text-align:right;margin-top:2px">${Math.max(0,Math.ceil(c.hp))}/${c.maxHp}</div>`;}
function renderBattle(){
  if(!B)return;
  const fm=document.getElementById('foeMon'),am=document.getElementById('allyMon');
  fm.innerHTML='';am.innerHTML='';
  const fc=document.createElement('canvas');fc.width=118;fc.height=118;drawCritter(fc,118,B.foe.species);fm.appendChild(fc);
  const ac=document.createElement('canvas');ac.width=124;ac.height=124;drawCritter(ac,124,B.ally.species);am.appendChild(ac);
  document.getElementById('foePlate').innerHTML=plate(B.foe);
  document.getElementById('allyPlate').innerHTML=plate(B.ally);
  const bc=document.getElementById('bCatch');if(bc){bc.textContent=`Catch (${G.items.orb})`;bc.disabled=G.items.orb<=0;}
}
function setBMsg(m){document.getElementById('bmsg').innerHTML=m;}
function calcDamage(att,def,move){const m=MOVES[move],eff=effect(m.type,def.type),stab=att.type===m.type?1.2:1;
  let atk=att.atk;if(att.status==='burn'||att.status==='chill')atk*=0.8;
  const base=(((2*att.level/5+2)*m.power*(atk/def.def))/25)+2;
  return{dmg:Math.max(1,Math.floor(base*eff*stab*(0.85+Math.random()*0.15))),eff};}
function statusTick(mon){let dmg=0,canAct=true,note='';const st=mon.status;
  if(st==='burn'){dmg=Math.max(2,Math.floor(mon.maxHp/16));note=`${mon.species} is hurt by its burn!`;}
  else if(st==='poison'){dmg=Math.max(3,Math.floor(mon.maxHp/9));note=`${mon.species} is hurt by poison!`;}
  else if(st==='sleep'){mon.statusT=(mon.statusT||0)-1;if(mon.statusT<=0){mon.status=null;note=`${mon.species} woke up!`;}else{canAct=false;note=`${mon.species} is fast asleep…`;}}
  else if(st==='para'){if(Math.random()<0.25){canAct=false;note=`${mon.species} is paralyzed! It can't move!`;}}
  else if(st==='chill'){mon.statusT=(mon.statusT||0)-1;if(mon.statusT<=0)mon.status=null;}
  return{dmg,canAct,note};}
function applyStatus(mon,k){mon.status=k;mon.statusT=k==='sleep'?1+Math.floor(Math.random()*3):k==='chill'?4:0;}
function sMsg(n,k){return k==='burn'?`${n} was burned!`:k==='poison'?`${n} was poisoned!`:k==='para'?`${n} was paralyzed!`:k==='sleep'?`${n} fell asleep!`:k==='chill'?`${n} was chilled!`:'';}
function playerMove(mv){if(!B||B.busy)return;B.busy=true;
  const s=statusTick(B.ally);if(s.dmg){B.ally.hp-=s.dmg;flashMon('allyMon');}renderBattle();
  if(B.ally.hp<=0){setBMsg(s.note);return setTimeout(faintAlly,900);}
  if(!s.canAct){setBMsg(s.note);return setTimeout(foeTurn,1000);}
  const m=MOVES[mv];if(Math.random()>m.acc){setBMsg(`${B.ally.species} used <b>${mv}</b>… but it missed!`);return setTimeout(foeTurn,900);}
  let msg=`${B.ally.species} used <b>${mv}</b>!`;
  if(m.power>0){const{dmg,eff}=calcDamage(B.ally,B.foe,mv);B.foe.hp-=dmg;flashMon('foeMon');msg+=eff>1?' Super effective!':eff<1?' Not very effective…':'';}
  if(m.status&&!B.foe.status&&B.foe.hp>0&&Math.random()<(m.schance||0)){applyStatus(B.foe,m.status);msg+=' '+sMsg(B.foe.species,m.status);}
  setBMsg(msg);renderBattle();setTimeout(()=>{if(B.foe.hp<=0)winBattle();else foeTurn();},850);}
function foeTurn(){if(!B)return;if(B.foe.hp<=0)return winBattle();
  const s=statusTick(B.foe);if(s.dmg){B.foe.hp-=s.dmg;flashMon('foeMon');}renderBattle();
  if(B.foe.hp<=0){setBMsg(s.note);return setTimeout(winBattle,900);}
  if(!s.canAct){setBMsg(s.note);return setTimeout(endPlayerTurn,1000);}
  const mv=B.foe.moves[Math.floor(Math.random()*B.foe.moves.length)],m=MOVES[mv];
  if(Math.random()>m.acc){setBMsg(`Wild ${B.foe.species} used <b>${mv}</b>… but missed!`);return setTimeout(endPlayerTurn,900);}
  let msg=`Wild ${B.foe.species} used <b>${mv}</b>!`;
  if(m.power>0){const{dmg,eff}=calcDamage(B.foe,B.ally,mv);B.ally.hp-=dmg;flashMon('allyMon');msg+=eff>1?' Super effective!':eff<1?' Not very effective…':'';}
  if(m.status&&!B.ally.status&&B.ally.hp>0&&Math.random()<(m.schance||0)){applyStatus(B.ally,m.status);msg+=' '+sMsg(B.ally.species,m.status);}
  setBMsg(msg);renderBattle();setTimeout(()=>{if(B.ally.hp<=0)faintAlly();else endPlayerTurn();},850);}
function endPlayerTurn(){if(!B)return;B.busy=false;setBMsg('What will you do?');}
function faintAlly(){if(!B)return;B.ally.hp=0;renderBattle();setBMsg(`${B.ally.species} fainted!`);const next=firstAlive();
  setTimeout(()=>{if(next){B.ally=next;renderBattle();setBMsg(`Go, ${next.species}!`);B.busy=false;}
    else{setBMsg('All your critters have fainted!');setTimeout(()=>{endBattle();
      dialog("<b>You blacked out…</b> A kind stranger carried you back to town.",()=>{
        G.party.forEach(c=>{c.hp=Math.max(1,Math.floor(c.maxHp*0.5));c.status=null;});
        P.x=5.5*TILE;P.y=6.5*TILE;G.energy=Math.max(30,G.energy);save();});},900);}},900);}
function winBattle(){if(!B)return;B.foe.hp=0;renderBattle();const gain=8+B.foe.level*5,coins=6+B.foe.level*3+Math.floor(Math.random()*6);
  G.coins+=coins;setBMsg(`Wild ${B.foe.species} fainted! +${gain} XP · +${coins} coins.`);grantXp(B.ally,gain);
  setTimeout(endBattle,1300);}
function grantXp(c,a){c.xp+=a;while(c.xp>=xpToNext(c.level)&&c.level<50){c.xp-=xpToNext(c.level);c.level++;const b=c.maxHp;recalc(c);c.hp+=(c.maxHp-b);toast(`${c.species} grew to Lv.${c.level}!`);}save();}
function throwOrb(sup){if(!B||B.busy)return;const it=G.items;
  if(sup){if(it.superorb<=0)return;it.superorb--;}else{if(it.orb<=0)return;it.orb--;}
  B.busy=true;renderBattle();const hr=B.foe.hp/B.foe.maxHp;
  let ch=(1-hr)*0.6+0.16-B.foe.level*0.006;if(B.foe.status)ch+=0.12;if(sup)ch=ch*1.7+0.1;ch=Math.min(0.95,Math.max(0.03,ch));
  setBMsg(`You threw ${sup?'a <b>Super Orb</b>':'an <b>Orb</b>'}…`);document.getElementById('foeMon').classList.add('shake');
  setTimeout(()=>{document.getElementById('foeMon').classList.remove('shake');if(!B)return;
    if(Math.random()<ch){B.caught=true;B.foe.status=null;const res=G.party.length>=6;if(!res)G.party.push(B.foe);
      G.caughtSpecies[B.foe.species]=true;setBMsg(`Gotcha! <b>${B.foe.species}</b> was caught!`+(res?' (Team full — released.)':''));save();setTimeout(endBattle,1300);}
    else{setBMsg(`Oh no! ${B.foe.species} broke free!`);setTimeout(foeTurn,900);}},1100);}
function openBagMenu(){if(B.busy)return;const it=G.items,fn=G.party.some(c=>c.hp<=0),menu=document.getElementById('bmenu');
  menu.innerHTML=`<div id="bmsg">Use which item?</div>
    <button class="cbtn small" data-use="berry" ${it.berry<=0?'disabled':''}>Berry (${it.berry})</button>
    <button class="cbtn small" data-use="potion" ${it.potion<=0?'disabled':''}>Potion (${it.potion})</button>
    <button class="cbtn small" data-use="superorb" ${it.superorb<=0?'disabled':''}>Super Orb (${it.superorb})</button>
    <button class="cbtn small" data-use="revive" ${(it.revive<=0||!fn)?'disabled':''}>Revive (${it.revive})</button>
    <button class="cbtn small wide" id="backBag">◀ Back</button>`;
  menu.querySelectorAll('[data-use]').forEach(b=>b.onclick=()=>useBattleItem(b.dataset.use));
  document.getElementById('backBag').onclick=restoreBattleMenu;}
function useBattleItem(k){const it=G.items;
  if(k==='superorb'){if(it.superorb<=0)return;restoreBattleMenu();return throwOrb(true);}
  if(k==='berry'){if(it.berry<=0)return;it.berry--;const h=Math.floor(B.ally.maxHp*0.4);B.ally.hp=Math.min(B.ally.maxHp,B.ally.hp+h);G.hunger=Math.min(100,G.hunger+10);return afterItem(`${B.ally.species} ate a Berry! +${h} HP.`);}
  if(k==='potion'){if(it.potion<=0)return;it.potion--;const h=Math.min(60,B.ally.maxHp-B.ally.hp);B.ally.hp+=h;return afterItem(`Potion restored ${h} HP.`);}
  if(k==='revive'){const f=G.party.find(c=>c.hp<=0);if(it.revive<=0||!f)return;it.revive--;f.hp=Math.floor(f.maxHp*0.5);f.status=null;return afterItem(`${f.species} was revived!`);}}
function afterItem(m){restoreBattleMenu();B.busy=true;setBMsg(m);renderBattle();save();setTimeout(foeTurn,1000);}
function tryRun(){if(B.busy)return;if(Math.random()<0.7){B.ran=true;setBMsg('Got away safely!');B.busy=true;setTimeout(endBattle,800);}else{setBMsg("Couldn't escape!");B.busy=true;setTimeout(foeTurn,900);}}
function endBattle(){if(B&&B.ally){B.ally.status=null;B.ally.statusT=0;}document.getElementById('battle').style.display='none';B=null;mode='world';encAccum=0;updateHud();save();}
function openFightMenu(){if(B.busy)return;const menu=document.getElementById('bmenu');let h='<div id="bmsg">Choose a move:</div>';
  B.ally.moves.forEach(mv=>{const m=MOVES[mv];h+=`<button class="cbtn small movebtn" data-mv="${mv}">${mv}<br><small>${m.type} · Pow ${m.power}</small></button>`;});
  h+='<button class="cbtn small wide" id="backBtn">◀ Back</button>';menu.innerHTML=h;
  menu.querySelectorAll('.movebtn').forEach(b=>b.onclick=()=>{restoreBattleMenu();playerMove(b.dataset.mv);});
  document.getElementById('backBtn').onclick=restoreBattleMenu;}
function restoreBattleMenu(){const menu=document.getElementById('bmenu');
  menu.innerHTML=`<div id="bmsg">What will you do?</div>
    <button class="cbtn" id="bFight">Fight</button><button class="cbtn" id="bCatch">Catch</button>
    <button class="cbtn" id="bBag">Bag</button><button class="cbtn" id="bRun">Run</button>`;wireBattle();renderBattle();}
function wireBattle(){document.getElementById('bFight').onclick=openFightMenu;
  document.getElementById('bCatch').onclick=()=>throwOrb(false);
  document.getElementById('bBag').onclick=openBagMenu;document.getElementById('bRun').onclick=tryRun;}
function flashMon(id){const el=document.getElementById(id);el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),400);}

/* ===================================================================
   PANEL / SHOP
   =================================================================== */
function openPanel(){if(mode!=='world'||dialogCb)return;mode='panel';const it=G.items,p=document.getElementById('panel');
  let h='<h2>Team &amp; Bag</h2>';
  h+=`<div class="subline"><span style="color:#ffd23c">◉ ${G.coins}</span> · Day ${G.day} · Caught ${Object.keys(G.caughtSpecies).length}/${Object.keys(SPECIES).length}</div>`;
  h+='<div class="plist">';
  G.party.forEach((c,i)=>{const pct=Math.max(0,c.hp/c.maxHp*100);
    h+=`<div class="pcard"><canvas class="mini" width="46" height="46" data-sp="${c.species}"></canvas>
      <div style="flex:1"><div><b>${c.species}</b> ${typeChip(c.type)}${statusChip(c)} <span class="lv">Lv.${c.level}</span></div>
        <div class="hpwrap"><i style="width:${pct}%"></i></div>
        <small>${Math.ceil(Math.max(0,c.hp))}/${c.maxHp} HP · XP ${c.xp}/${xpToNext(c.level)}</small></div>
      ${i>0?`<button class="cbtn small" data-lead="${i}">Lead</button>`:'<span class="lv">Lead</span>'}</div>`;});
  h+='</div>';
  h+=`<div class="subline">Bag — Orbs ${it.orb} · Super ${it.superorb} · Berry ${it.berry} · Potion ${it.potion} · Revive ${it.revive} · Ration ${it.ration}</div>`;
  const fn=G.party.some(c=>c.hp<=0);
  h+='<div class="prow">';
  h+=`<button class="cbtn small" data-item="berry" ${it.berry<=0?'disabled':''}>Eat Berry (+hunger, heal lead)</button>`;
  h+=`<button class="cbtn small" data-item="potion" ${it.potion<=0?'disabled':''}>Use Potion (+60 HP)</button>`;
  h+=`<button class="cbtn small" data-item="ration" ${it.ration<=0?'disabled':''}>Eat Ration (fill hunger)</button>`;
  h+=`<button class="cbtn small" data-item="revive" ${(it.revive<=0||!fn)?'disabled':''}>Use Revive</button>`;
  h+=`<button class="cbtn small" id="closePanel">Close</button></div>`;
  p.innerHTML=h;p.style.display='flex';
  p.querySelectorAll('canvas.mini').forEach(cv=>drawCritter(cv,46,cv.dataset.sp));
  p.querySelectorAll('[data-lead]').forEach(b=>b.onclick=()=>{const i=+b.dataset.lead;const c=G.party.splice(i,1)[0];G.party.unshift(c);save();openPanel();});
  p.querySelectorAll('[data-item]').forEach(b=>b.onclick=()=>usePanelItem(b.dataset.item));
  document.getElementById('closePanel').onclick=closePanel;}
function usePanelItem(k){const it=G.items,l=firstAlive()||G.party[0];
  if(k==='berry'){if(it.berry<=0)return;it.berry--;G.hunger=Math.min(100,G.hunger+25);l.hp=Math.min(l.maxHp,l.hp+Math.floor(l.maxHp*0.35));toast('Ate a Berry');}
  else if(k==='potion'){if(it.potion<=0)return;it.potion--;l.hp=Math.min(l.maxHp,l.hp+60);toast('Used a Potion');}
  else if(k==='ration'){if(it.ration<=0)return;it.ration--;G.hunger=100;toast('Hunger restored');}
  else if(k==='revive'){const f=G.party.find(c=>c.hp<=0);if(it.revive<=0||!f)return;it.revive--;f.hp=Math.floor(f.maxHp*0.5);f.status=null;toast(`${f.species} revived`);}
  save();openPanel();}
function closePanel(){document.getElementById('panel').style.display='none';mode='world';}
function openShop(){if(mode!=='world'||dialogCb)return;mode='panel';const p=document.getElementById('panel');
  let h='<h2>🛒 Trader&#39;s Mart</h2>';h+=`<div class="subline" style="color:#ffd23c;font-size:16px">◉ ${G.coins} coins</div>`;
  h+='<div class="plist">';
  SHOP.forEach(s=>{h+=`<div class="pcard"><div style="flex:1"><div><b>${s.name}</b> <span style="color:#c98b3a">${s.price}c</span> <span class="lv">owned ${G.items[s.key]}</span></div>
    <small style="color:#8a6d3a">${s.desc}</small></div><button class="cbtn small" data-buy="${s.key}" ${G.coins<s.price?'disabled':''}>Buy</button></div>`;});
  h+='</div><div class="prow"><button class="cbtn small" id="closePanel">Leave shop</button></div>';
  p.innerHTML=h;p.style.display='flex';
  p.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>{const s=SHOP.find(x=>x.key===b.dataset.buy);if(!s||G.coins<s.price)return;G.coins-=s.price;G.items[s.key]++;toast(`Bought ${s.name}`);save();openShop();});
  document.getElementById('closePanel').onclick=closePanel;}

/* ===================================================================
   INPUT — joystick (pointer) + keyboard fallback
   =================================================================== */
const joy={active:false,id:null,ox:0,oy:0,nx:0,ny:0};
const kb={x:0,y:0};const keys={};
const joyBase=document.getElementById('joyBase'),joyKnob=document.getElementById('joyKnob');
function showJoy(x,y){joyBase.style.left=x+'px';joyBase.style.top=y+'px';joyKnob.style.left=x+'px';joyKnob.style.top=y+'px';joyBase.style.display='block';joyKnob.style.display='block';}
function moveKnob(x,y){joyKnob.style.left=x+'px';joyKnob.style.top=y+'px';}
function hideJoy(){joyBase.style.display='none';joyKnob.style.display='none';}
function isUI(t){return t.closest && t.closest('.ui-btn, #panel, #battle, .overlay, #dialog');}
window.addEventListener('pointerdown',e=>{
  if(mode!=='world'||dialogCb)return;if(isUI(e.target))return;
  joy.active=true;joy.id=e.pointerId;joy.ox=e.clientX;joy.oy=e.clientY;joy.nx=0;joy.ny=0;showJoy(e.clientX,e.clientY);
},{passive:false});
window.addEventListener('pointermove',e=>{if(!joy.active||e.pointerId!==joy.id)return;
  let dx=e.clientX-joy.ox,dy=e.clientY-joy.oy;const R=58;const d=Math.hypot(dx,dy);
  if(d>R){dx*=R/d;dy*=R/d;}joy.nx=dx/R;joy.ny=dy/R;moveKnob(joy.ox+dx,joy.oy+dy);});
function endJoy(e){if(joy.id!==null&&e.pointerId!==joy.id)return;joy.active=false;joy.id=null;joy.nx=0;joy.ny=0;hideJoy();}
window.addEventListener('pointerup',endJoy);window.addEventListener('pointercancel',endJoy);
// keyboard (desktop/testing)
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
  if(mode==='battle'||mode==='title'||mode==='starter')return;
  if(dialogCb&&(k===' '||k==='e'||k==='enter')){doInteract();return;}
  if(mode==='panel'){if(k==='escape'||k==='p'||k==='b')closePanel();return;}
  if(k==='p'||k==='b'){openPanel();return;}
  if(k===' '||k==='e'){doInteract();return;}
  keys[k]=true;updKb();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;updKb();});
function updKb(){kb.x=(keys['arrowright']||keys['d']?1:0)-(keys['arrowleft']||keys['a']?1:0);
  kb.y=(keys['arrowdown']||keys['s']?1:0)-(keys['arrowup']||keys['w']?1:0);}
// buttons
function bindBtn(el,fn){el.addEventListener('click',e=>{e.preventDefault();fn();});}
bindBtn(document.getElementById('btnA'),()=>{if(mode==='world')doInteract();else if(dialogCb)closeDialog();});
bindBtn(document.getElementById('btnMenu'),()=>{if(mode==='world')openPanel();else if(mode==='panel')closePanel();});

/* ===================================================================
   BOOT
   =================================================================== */
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);const w=window.innerWidth,h=window.innerHeight;
  canvas.width=Math.floor(w*DPR);canvas.height=Math.floor(h*DPR);canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);VIEW.w=w;VIEW.h=h;
  document.getElementById('rotate').style.display=(h>w&&w<560)?'flex':'none';}
window.addEventListener('resize',resize);window.addEventListener('orientationchange',resize);
function startWorld(){document.getElementById('title').style.display='none';document.getElementById('starterSel').style.display='none';mode='world';}
function buildStarters(){const wrap=document.getElementById('starterCards');wrap.innerHTML='';
  STARTERS.forEach(sp=>{const s=SPECIES[sp];const card=document.createElement('div');card.className='scard';
    card.innerHTML=`<canvas width="80" height="80"></canvas><b>${sp}</b><small style="color:${TYPES[s.type].color}">${s.type}</small>`;
    drawCritter(card.querySelector('canvas'),80,sp);
    card.onclick=()=>{newGame(sp);startWorld();dialog(`<b>${sp}</b> joins you! Use the joystick to roam and dive into the tall grass to find critters.`);};
    wrap.appendChild(card);});}
document.getElementById('startBtn').onclick=()=>{document.getElementById('title').style.display='none';
  document.getElementById('starterSel').style.display='flex';mode='starter';buildStarters();};
function init(){resize();buildGrid();wireBattle();
  if(load()){const t=document.getElementById('title');
    t.innerHTML='<h1>Critter Wilds</h1><p>Saved adventure found.</p><button class="bigbtn" id="resumeBtn">Continue</button><button class="bigbtn alt" id="newBtn">New Game</button>';
    document.getElementById('resumeBtn').onclick=()=>startWorld();
    document.getElementById('newBtn').onclick=()=>{document.getElementById('starterSel').style.display='flex';t.style.display='none';mode='starter';buildStarters();};}
  let last=performance.now();
  function loop(now){const dt=Math.min(0.05,(now-last)/1000)||0;last=now;
    if(mode==='world'){update(dt);renderWorld();}requestAnimationFrame(loop);}
  requestAnimationFrame(loop);}
init();
</script>
